    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="container">
        
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <a href="{{ '/' | relative_url }}" class="navbar-brand">AI Simplified</a>
            <div class="nav-links">
                <a href="{{ '/about.html' | relative_url }}">My Story</a>
